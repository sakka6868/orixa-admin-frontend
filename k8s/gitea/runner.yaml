# Gitea Actions Runner 部署说明
#
# Runner 通过宿主机 Docker 容器运行（不在 K8s 内），
# 因为 Runner 需要访问宿主机的 Docker daemon 来：
#   1. docker build 构建镜像
#   2. docker save/exec 导入镜像到 Kind 节点
#   3. kubectl 操作 K8s 集群
#
# === 首次部署步骤 ===
#
# 1. 启动临时容器，生成配置并注册：
#
#    MSYS_NO_PATHCONV=1 docker run -d --name gitea-runner \
#      --add-host gittea.sakka.local:host-gateway \
#      -v gitea-runner-data:/data -w /data \
#      --entrypoint "" gitea/act_runner:latest tail -f /dev/null
#
#    docker exec gitea-runner sh -c "act_runner generate-config > /data/config.yaml"
#
#    MSYS_NO_PATHCONV=1 docker exec -w /data gitea-runner sh -c \
#      "act_runner register --instance http://gittea.sakka.local \
#       --token <TOKEN> --name local-runner \
#       --config /data/config.yaml --no-interactive"
#
#    docker rm -f gitea-runner
#
# 2. 正式启动 Runner daemon：
#
#    MSYS_NO_PATHCONV=1 docker run -d --name gitea-runner \
#      --restart unless-stopped \
#      --add-host gittea.sakka.local:host-gateway \
#      -v /var/run/docker.sock:/var/run/docker.sock \
#      -v gitea-runner-data:/data -w /data \
#      -e DOCKER_HOST=unix:///var/run/docker.sock \
#      --entrypoint "" \
#      gitea/act_runner:latest act_runner daemon --config /data/config.yaml
#
# === 管理命令 ===
#
# 查看日志:    docker logs -f gitea-runner
# 停止:        docker stop gitea-runner
# 启动:        docker start gitea-runner
# 删除:        docker rm -f gitea-runner
# 删除数据:    docker volume rm gitea-runner-data
