# Runner 注册 Token
# 部署 Gitea 后，从管理页面获取真实 token 替换此处
# kubectl create secret generic gitea-runner-token \
#   --from-literal=token=<你的TOKEN> \
#   -n gitea --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: gitea-runner-token
  namespace: gitea
type: Opaque
stringData:
  token: "placeholder"
